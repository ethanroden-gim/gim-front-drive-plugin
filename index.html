<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save to Google Drive</title>
  <script src="https://dl.frontapp.com/libs/frontjs.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      font-size: 12px;
      padding: 10px;
      background: #fff;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-all;
      background: #f5f5f5;
      padding: 8px;
      border-radius: 4px;
      font-size: 11px;
    }
    #status {
      color: #666;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="status">Waiting for Front event...</div>
  <pre id="output">No data yet.</pre>

  <script>
    var statusEl = document.getElementById('status');
    var outputEl = document.getElementById('output');

    function log(label, data) {
      statusEl.textContent = label;
      try {
        outputEl.textContent = JSON.stringify(data, null, 2);
      } catch(e) {
        outputEl.textContent = String(data);
      }
    }

    log('Script loaded. Registering Front events...', {});

    Front.on('conversation', function(event) {
      log('conversation event fired', event);
    });

    Front.on('no_conversation', function(event) {
      log('no_conversation event fired', event);
    });

    // Also try the older style
    if (typeof Front.init === 'function') {
      log('Front.init exists, calling it...', {});
      Front.init({
        conversation: function(data) {
          log('Front.init conversation callback', data);
        }
      });
    }
  </script>
</body>
</html>
