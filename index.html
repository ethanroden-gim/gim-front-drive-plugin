<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save to Google Drive</title>
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #333;
      padding: 16px;
      background: #fff;
    }
    h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #1a1a1a;
    }
    .status {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
      min-height: 18px;
    }
    .status.error { color: #c0392b; }
    .status.success { color: #27ae60; }
    button {
      width: 100%;
      padding: 9px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
      transition: background 0.2s;
    }
    #signInBtn {
      background: #4285F4;
      color: white;
    }
    #signInBtn:hover { background: #3367d6; }
    #pickFolderBtn {
      background: #f1f3f4;
      color: #333;
      border: 1px solid #dadce0;
    }
    #pickFolderBtn:hover { background: #e8eaed; }
    #saveBtn {
      background: #34a853;
      color: white;
    }
    #saveBtn:hover { background: #2d8f47; }
    #saveBtn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .attachment-list {
      margin-bottom: 12px;
    }
    .attachment-item {
      display: flex;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }
    .attachment-item input {
      margin-right: 8px;
      cursor: pointer;
    }
    .attachment-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .folder-selected {
      font-size: 12px;
      color: #4285F4;
      margin-bottom: 10px;
      word-break: break-word;
    }
    .hidden { display: none; }
  </style>
  <script type="module" crossorigin src="/gim-front-drive-plugin/assets/main.js"></script>
</head>
<body>

  <h2>Save to Google Drive</h2>
  <div class="status" id="status">Initializing...</div>

  <div id="signInSection" class="hidden">
    <button id="signInBtn">Sign in with Google</button>
  </div>

  <div id="mainSection" class="hidden">
    <div class="attachment-list" id="attachmentList"></div>
    <div class="folder-selected hidden" id="folderName"></div>
    <button id="pickFolderBtn">📁 Select Drive Folder</button>
    <button id="saveBtn" disabled>Save to Drive</button>
  </div>

</body>
</html>
